<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Suomen Kiertomatka - Interaktiivinen Aikataulu</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial, sans-serif; overflow: hidden; }
        
        /* Korjattu viewport-määrite iPhonen Safari-yhteensopivuutta varten */
        #map { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; }
        
        #control-panel {
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2); width: 320px;
            max-height: 85vh; overflow-y: auto; font-size: 14px;
            box-sizing: border-box;
            transition: max-height 0.3s ease;
            -webkit-overflow-scrolling: touch; /* Sulava selaus iOS:lla */
        }
        
        select { width: 100%; padding: 10px; margin-bottom: 10px; font-size: 14px; font-weight: bold; border-radius: 4px; border: 1px solid #ccc; }
        
        .timetable { margin-top: 10px; border-collapse: collapse; width: 100%; font-size: 12px; }
        .timetable th, .timetable td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        .timetable th { background-color: #f4f4f4; position: sticky; top: 0; }
        
        .pause-row { color: #888; font-style: italic; background-color: #fafafa; }
        
        .passed-row { color: #aaa !important; text-decoration: line-through; background-color: #fdfdfd; }
        .passed-row td { color: #aaa !important; }
        .active-row { background-color: #e3f2fd !important; font-weight: bold; border-left: 4px solid #0076ff; }
        
        .loading {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: white; padding: 10px 20px;
            border-radius: 20px; z-index: 1001; font-weight: bold; display: none;
        }

        /* Mobiiliystävälliset säätimet */
        #toggle-panel-btn {
            display: none;
            width: 100%;
            padding: 12px;
            background: #0076ff;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        
        #center-user-btn {
            display: none;
            width: 100%;
            padding: 10px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
            font-size: 13px;
        }

        #gps-status {
            font-size: 11px;
            margin-top: 5px;
            color: #555;
            line-height: 1.3;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 12px;
            user-select: none;
        }

        .checkbox-container input {
            margin-right: 8px;
            width: 16px;
            height: 16px;
        }

        /* Mobiilioptimointi */
        @media (max-width: 600px) {
            #control-panel {
                width: calc(100% - 20px);
                max-height: 50vh;
                top: auto;
                bottom: 10px;
                left: 10px;
                right: 10px;
                padding: 12px;
                border-radius: 12px;
            }
            #control-panel.collapsed {
                max-height: 55px;
                overflow: hidden;
            }
            #control-panel.collapsed #timetable-container,
            #control-panel.collapsed h4,
            #control-panel.collapsed #day-select,
            #control-panel.collapsed #gps-status,
            #control-panel.collapsed #center-user-btn,
            #control-panel.collapsed .checkbox-container {
                display: none !important;
            }
            #toggle-panel-btn {
                display: block !important;
            }
        }
    </style>
</head>

    function formatTime(totalMinutes) {
        let hours = Math.floor(totalMinutes / 60) % 24;

    // Haversine-kaava kahden koordinaatin etäisyyden laskemiseksi (kilometreinä)
    function getDistance(coord1, coord2) {
        const lat1 = coord1[0], lon1 = coord1[1];
        const lat2 = coord2[0], lon2 = coord2[1];
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

                const pCoords = locs[pName];
                const dist = getDistance(userCoords, pCoords);

                    minDistance = dist;
                    closestIdx = idx;
                }
            });

                statusEl.innerHTML = `GPS: <span style='color: orange;'>Päällä</span> (Vakioaikataulu, olet kaukana reitistä [${minDistance.toFixed(0)} km])`;
            }
        }

            const pName = route.points[i];
            let arrivalTimeStr = "";
            let rowClass = "";
            let labelExtra = "";

            if (useRealTime) {
                if (i < closestIdx) {
                    // Jo ohitetut kohteet lasketaan taaksepäin oletusajalla 08:00
                    currentMinutes += route.driveTimes[i];
                    arrivalTimeStr = formatTime(currentMinutes);
                    rowClass = "class='passed-row'";
                    labelExtra = " <span style='font-size: 10px; color:#aaa;'>(Ohitettu)</span>";
                    
                    if (i < route.points.length - 1) {
                        currentMinutes += 30;
                    }
                } else if (i === closestIdx) {
                    // Aktiivinen lähin piste asetetaan tähän hetkeen
                    arrivalTimeStr = formatTime(nowMinutes);
                    rowClass = "class='active-row'";
                    labelExtra = " <span style='color: #0076ff;'>&bull; Nykyinen sijainti</span>";
                    currentMinutes = nowMinutes;
                } else {
                    // Tulevat kohteet lasketaan tästä hetkestä eteenpäin
                    if (i === closestIdx + 1) {
                        currentMinutes += 30; // Taukoaika nykyisessä kohteessa
                    } else {
                        currentMinutes += 30; 
                    }
                    currentMinutes += route.driveTimes[i];
                    arrivalTimeStr = formatTime(currentMinutes);
                }
            } else {
                // Vakioaikataulu ilman GPS-tukea
                currentMinutes += route.driveTimes[i];
                arrivalTimeStr = formatTime(currentMinutes);
                if (i < route.points.length - 1) {
                    currentMinutes += 30;
                }
            }

            tableHtml += `<tr ${rowClass}><td><b>${arrivalTimeStr}</b></td><td>${pName}${labelExtra}</td></tr>`;

            // Odotusaika / pysähdysrivi
            if (i < route.points.length - 1) {
                let pauseText = "Kohteessa (30 min)";
                let arrTimeVal = 0;
                let depTimeVal = 0;

                if (useRealTime) {
                    if (i < closestIdx) {
                        arrTimeVal = currentMinutes - 30;
                        depTimeVal = currentMinutes;
                        tableHtml += `<tr class="pause-row passed-row"><td>${formatTime(arrTimeVal)}-${formatTime(depTimeVal)}</td><td>${pauseText}</td></tr>`;
                    } else if (i === closestIdx) {
                        arrTimeVal = nowMinutes;
                        depTimeVal = nowMinutes + 30;
                        tableHtml += `<tr class="pause-row active-row"><td>${formatTime(arrTimeVal)}-${formatTime(depTimeVal)}</td><td>Tauko / käynnissä nyt</td></tr>`;
                    } else {
                        arrTimeVal = currentMinutes;
                        depTimeVal = currentMinutes + 30;
                        tableHtml += `<tr class="pause-row"><td>${formatTime(arrTimeVal)}-${formatTime(depTimeVal)}</td><td>${pauseText}</td></tr>`;
                    }
                } else {
                    arrTimeVal = currentMinutes - 30;
                    depTimeVal = currentMinutes;
                    tableHtml += `<tr class="pause-row"><td>${formatTime(arrTimeVal)}-${formatTime(depTimeVal)}</td><td>${pauseText}</td></tr>`;
                }
            }
        }
        
        tableHtml += `</table>`;
        document.getElementById('timetable-container').innerHTML = tableHtml;
    }

    // OSRM-reitin haku ja piirtäminen
    async function updateActiveRoute() {
        const routeIdx = selectEl.value;
        const route = routes[routeIdx];
        
        // Tallennetaan valittu reitti selaimen muistiin
        localStorage.setItem('selectedRouteIdx', routeIdx);
        updateToggleBtnText();

        routeLayer.clearLayers();
        markerLayer.clearLayers();
        document.getElementById('loading').style.display = 'block';

        let bounds = [];

        for (let i = 0; i < route.points.length; i++) {
            const pName = route.points[i];
            const pCoords = locs[pName];
            bounds.push(pCoords);

            let color = "#3388ff";
            let radius = 6;
            if (pName.includes("(KOTI)")) { color = "#000000"; radius = 9; }
            else if (pName.includes("(YÖ")) { color = "#ff0000"; radius = 9; }
            else if (pName.includes("Kirkko") || pName.includes("Ovitek")) { color = "#9c27b0"; radius = 8; }

            let marker = L.circleMarker(pCoords, {
                radius: radius, fillColor: color, color: "#fff", weight: 2, fillOpacity: 0.9
            }).bindPopup(`<b>${pName}</b>`);
            markerLayer.addLayer(marker);
        }

        renderTimetable();

        let coordsString = route.points.map(p => `${locs[p][1]},${locs[p][0]}`).join(';');
        let url = `https://router.project-osrm.org/route/v1/driving/${coordsString}?geometries=geojson&overview=full`;

        try {
            let response = await fetch(url);
            let data = await response.json();
            if (data.routes && data.routes.length > 0) {
                L.geoJSON(data.routes[0].geometry, {
                    style: { color: route.color, weight: 5, opacity: 0.85 }
                }).addTo(routeLayer);
            }
        } catch (error) {
            console.error("OSRM API -virhe, käytetään varalinjaa: ", error);
            let rawCoords = route.points.map(p => locs[p]);
            L.polyline(rawCoords, {color: route.color, weight: 4, dashArray: "5, 5"}).addTo(routeLayer);
        }

        if (bounds.length > 0) {
            map.fitBounds(L.latLngBounds(bounds), { padding: [40, 40] });
        }
        document.getElementById('loading').style.display = 'none';
    }

    // Käynnistetään GPS-seuranta
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                userCoords = [lat, lng];

                if (!userMarker) {
                    const userIcon = L.divIcon({
                        className: 'user-location-marker',
                        html: '<div style="background-color: #0076ff; width: 14px; height: 14px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.4);"></div>',
                        iconSize: [20, 20],
                        iconAnchor: [10, 10]
                    });
                    userMarker = L.marker([lat, lng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);
                    userMarker.bindPopup("Sinun sijaintisi");
                    
                    document.getElementById('center-user-btn').style.display = 'block';
                } else {
                    userMarker.setLatLng([lat, lng]);
                }

                renderTimetable();
            },
            (error) => {
                console.warn("GPS-signaalia ei saatu: ", error.message);
                document.getElementById('gps-status').innerHTML = "GPS: <span style='color: red;'>Ei yhteyttä</span> (Näytetään vakioaikataulu. Salli sijaintiluvat puhelimen asetuksista ja käytä HTTPS-yhteyttä)";
            },
            { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
        );
    } else {
        document.getElementById('gps-status').innerHTML = "GPS-seuranta: Ei tuettu laitteellasi";
    }

    // Alustetaan oletusreitti
    updateActiveRoute();
</script>
